<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 形狀小奇兵 3.2 Professional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        :root {
            --primary: #FF7E5F;
            --secondary: #6B66FF;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: #FFF9E6;
            --card: rgba(255, 255, 255, 0.95);
        }

        body { 
            margin: 0; overflow: hidden; 
            font-family: 'Comic Sans MS', 'Microsoft JhengHei', sans-serif;
            background: var(--bg); touch-action: none;
        }
        
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top:0; left:0; z-index: 1; }

        /* UI 層 */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }

        header { 
            pointer-events: auto; margin: 10px; padding: 12px 20px;
            background: var(--card); border-radius: 50px; border: 3px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        /* Logo 增大一倍 */
        .logo-box { width: 200px; height: 80px; background: #f0f0f0; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-box img { width: 100%; height: 100%; object-fit: contain; }
        
        .top-controls { display: flex; gap: 8px; }
        .lang-btn { background: #555; color: white; border: none; padding: 8px 16px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .mode-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 15px; font-weight: bold; cursor: pointer; }

        .info-card { 
            pointer-events: auto; position: absolute; top: 110px; right: 15px; width: 240px;
            background: var(--card); padding: 15px; border-radius: 20px; border: 3px solid var(--secondary);
            box-shadow: 0 6px 15px rgba(107, 102, 255, 0.2);
        }

        .controls-bar { pointer-events: auto; display: flex; gap: 10px; overflow-x: auto; padding: 15px; background: white; border-top: 3px solid var(--primary); }
        .shape-btn { background: #fff; border: 2px solid var(--primary); padding: 10px 20px; border-radius: 25px; font-weight: bold; color: var(--primary); white-space: nowrap; cursor: pointer; }
        .shape-btn.active { background: var(--primary); color: white; }

        /* 遊戲層 */
        #game-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        .quiz-box { background: white; width: 85%; max-width: 450px; border-radius: 30px; padding: 30px; text-align: center; border: 5px solid var(--secondary); }
        .ans-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 20px; }
        .ans-btn { background: #f0f0ff; border: 2px solid var(--secondary); padding: 18px 5px; border-radius: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        
        #cursor-tooltip { position: fixed; background: white; border: 2px solid var(--primary); padding: 5px 12px; border-radius: 10px; font-weight: bold; z-index: 1000; pointer-events: none; display: none; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="cursor-tooltip"></div>

    <div id="ui-layer">
        <header>
            <div class="logo-box">
                <img src="logo.png" alt="LOGO" id="appLogo" onerror="this.style.display='none'; this.parentNode.innerText='Your Logo Here';">
            </div>
            <div class="top-controls">
                <button class="lang-btn" onclick="toggleLang()">EN/中</button>
                <button class="mode-btn" onclick="startChallenge()">➔ <span id="modeText">挑戰模式</span></button>
            </div>
        </header>

        <div class="info-card" id="infoCard">
            <h2 id="infoTitle" style="margin:0; color:var(--secondary);">正方體</h2>
            <p id="infoDesc" style="margin:8px 0; font-size:1rem; color:#444;">載入中...</p>
        </div>

        <div class="controls-bar" id="controlsBar">
            <button class="shape-btn active" onclick="loadShape('cube')">🧊 <span class="s-n">正方體</span></button>
            <button class="shape-btn" onclick="loadShape('cylinder')">🛢️ <span class="s-n">圓柱體</span></button>
            <button class="shape-btn" onclick="loadShape('cone')">🍦 <span class="s-n">圓錐體</span></button>
            <button class="shape-btn" onclick="loadShape('sq_pyramid')">⛺ <span class="s-n">四角錐</span></button>
            <button class="shape-btn" onclick="loadShape('tri_prism')">🧀 <span class="s-n">三角柱</span></button>
            <button class="shape-btn" onclick="loadShape('sphere')">⚽ <span class="s-n">球體</span></button>
        </div>
    </div>

    <div id="game-layer">
        <div class="quiz-box" id="quiz-screen">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <span id="quiz-progress" style="font-weight:bold; color:var(--secondary); font-size:1.2rem;">題目: 1 / 6</span>
                <button onclick="exitGame()" style="border:none; background:none; font-size:1.5rem; cursor:pointer;">❌</button>
            </div>
            <div id="qIcon" style="font-size:5rem; margin-bottom:15px;">📦</div>
            <h3 id="qText" style="font-size:1.4rem;">這是什麼？</h3>
            <div id="gameArea"></div>
            <div id="feedback" style="margin-top:15px; font-weight:bold; height:24px; font-size:1.2rem;"></div>
            <button onclick="skipQuestion()" style="margin-top:20px; background:none; border:1px solid #ccc; color:#888; padding:8px 20px; border-radius:10px; cursor:pointer;">略過 Skip</button>
        </div>

        <div class="quiz-box" id="result-screen" style="display:none;">
            <h2 style="color:var(--primary); font-size:2rem;">完成挑戰！</h2>
            <div id="resScore" style="font-size:4rem; font-weight:bold; color:var(--secondary); margin:20px 0;">60分</div>
            <p id="resFeedback" style="font-size:1.2rem;">你表現得太棒了！</p>
            <button class="ans-btn" style="width:100%; background:var(--primary); color:white; margin-top:20px;" onclick="exitGame()">返回觀察模式</button>
        </div>
    </div>

    <script>
        const i18n = {
            zh: {
                face: "面 (Face)", edge: "邊 (Edge)", vertex: "頂點 (Vertex)",
                prism: "柱體", pyramid: "錐體", sphere: "球體",
                correct: "太棒了！🌟", wrong: "不對喔！再試一次", finish: "完成挑戰！",
                shapes: {
                    cube: ["正方體", "由 6 個正方形組成，有 8 個頂點。"],
                    cylinder: ["圓柱體", "像汽水罐，上下底面是圓形。"],
                    cone: ["圓錐體", "像派對帽，只有 1 個尖頂。"],
                    sq_pyramid: ["四角錐", "底面是方形，側面是 4 個三角形。"],
                    tri_prism: ["三角柱", "底面是三角形，側面是 3 個長方形。"],
                    sphere: ["球體", "圓溜溜的，沒有頂點也沒有邊。"]
                },
                quizzes: [
                    { t: 'c', i: '📦', q: '快遞紙箱屬於哪一類？', a: 'prism' },
                    { t: 'c', i: '⚽', q: '足球屬於哪一類？', a: 'sphere' },
                    { t: 'c', i: '⛺', q: '這帳篷屬於哪一類？', a: 'prism' }, // 屋型帳篷是三角柱
                    { t: 'i', i: '❓', q: '正方體有幾個頂點？', a: ['8'] },
                    { t: 'i', i: '🍦', q: '圓錐體有幾個頂點？', a: ['1'] },
                    { t: 'i', i: '⚽', q: '球體有幾個平面？', a: ['0'] }
                ]
            },
            en: {
                face: "Face", edge: "Edge", vertex: "Vertex",
                prism: "Prism", pyramid: "Pyramid", sphere: "Sphere",
                correct: "Amazing! 🌟", wrong: "Not quite!", finish: "Challenge Done!",
                shapes: {
                    cube: ["Cube", "6 square faces and 8 vertices."],
                    cylinder: ["Cylinder", "Like a can with circular bases."],
                    cone: ["Cone", "Has 1 vertex like a hat."],
                    sq_pyramid: ["Sq. Pyramid", "Square base and 4 triangles."],
                    tri_prism: ["Tri. Prism", "Triangular bases, 3 rectangles."],
                    sphere: ["Sphere", "Round, no vertices or edges."]
                },
                quizzes: [
                    { t: 'c', i: '📦', q: 'What is a box?', a: 'prism' },
                    { t: 'c', i: '⚽', q: 'What is a ball?', a: 'sphere' },
                    { t: 'c', i: '⛺', q: 'What is this tent?', a: 'prism' },
                    { t: 'i', i: '❓', q: 'How many vertices on a cube?', a: ['8'] },
                    { t: 'i', i: '🍦', q: 'How many vertices on a cone?', a: ['1'] },
                    { t: 'i', i: '⚽', q: 'How many flat faces on a sphere?', a: ['0'] }
                ]
            }
        };

        let lang = 'zh', score = 0, qCount = 0, quizPool = [];
        let scene, camera, renderer, controls, raycaster, mouse, currentGroup = new THREE.Group(), interactables = [];

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xFFF9E6);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
            camera.position.set(0, 2, 5);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            raycaster = new THREE.Raycaster();
            raycaster.params.Line.threshold = 0.25; 
            mouse = new THREE.Vector2();
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            scene.add(currentGroup);
            window.addEventListener('resize', onResize);
            window.addEventListener('pointermove', onPointerMove);
            loadShape('cube');
            animate();
        }

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }

        function onResize() {
            camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function loadShape(type) {
            while(currentGroup.children.length > 0) currentGroup.remove(currentGroup.children[0]);
            interactables = [];
            
            const info = i18n[lang].shapes[type];
            document.getElementById('infoTitle').innerText = info[0];
            document.getElementById('infoDesc').innerText = info[1];
            
            let geo, vPos = [];
            if(type==='cube') { geo = new THREE.BoxGeometry(1.8,1.8,1.8); vPos=[[0.9,0.9,0.9],[0.9,0.9,-0.9],[0.9,-0.9,0.9],[0.9,-0.9,-0.9],[-0.9,0.9,0.9],[-0.9,0.9,-0.9],[-0.9,-0.9,0.9],[-0.9,-0.9,-0.9]]; }
            else if(type==='cylinder') geo = new THREE.CylinderGeometry(1,1,2.5,32);
            else if(type==='cone') { geo = new THREE.ConeGeometry(1.2,2.5,32); vPos=[[0,1.25,0]]; }
            else if(type==='sq_pyramid') { geo = new THREE.ConeGeometry(1.5,2.5,4); geo.rotateY(Math.PI/4); vPos=[[0,1.25,0],[1.06,-1.25,1.06],[-1.06,-1.25,1.06],[1.06,-1.25,-1.06],[-1.06,-1.25,-1.06]]; }
            else if(type==='tri_prism') { geo = new THREE.CylinderGeometry(1.2,1.2,2.5,3); vPos=[[0,1.25,1.2],[1.04,1.25,-0.6],[-1.04,1.25,-0.6],[0,-1.25,1.2],[1.04,-1.25,-0.6],[-1.04,-1.25,-0.6]]; }
            else if(type==='sphere') geo = new THREE.SphereGeometry(1.3,32,32);

            const mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({color:0x6B66FF, transparent:true, opacity:0.85}));
            mesh.userData = { type: 'face', label: i18n[lang].face };
            currentGroup.add(mesh);
            interactables.push(mesh);

            if(type!=='sphere') {
                const lines = new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({color:0xffffff, linewidth: 2}));
                lines.userData = { type: 'edge', label: i18n[lang].edge };
                currentGroup.add(lines);
                interactables.push(lines);
            }

            // 頂點感應球：直接作為 Mesh 的子物件，解決旋轉缺失問題
            const vGeo = new THREE.SphereGeometry(0.25);
            vPos.forEach(p => {
                const v = new THREE.Mesh(vGeo, new THREE.MeshBasicMaterial({color: 0xFF7E5F, transparent:true, opacity:0}));
                v.position.set(p[0], p[1], p[2]);
                v.userData = { type: 'vertex', label: i18n[lang].vertex };
                v.renderOrder = 999; // 確保在最上層渲染
                mesh.add(v); // 重要：掛載到 mesh 下
                interactables.push(v);
            });
        }

        function onPointerMove(e) {
            if(document.getElementById('game-layer').style.display==='flex') return;
            mouse.x = (e.clientX/window.innerWidth)*2-1;
            mouse.y = -(e.clientY/window.innerHeight)*2+1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactables, true);
            const tip = document.getElementById('cursor-tooltip');
            
            if(intersects.length > 0) {
                const hit = intersects.find(o=>o.object.userData.type==='vertex') || intersects.find(o=>o.object.userData.type==='edge') || intersects[0];
                tip.style.display = 'block'; 
                tip.style.left = e.clientX+12+'px'; 
                tip.style.top = e.clientY+12+'px';
                tip.innerText = hit.object.userData.label;
            } else tip.style.display = 'none';
        }

        function startChallenge() {
            score = 0; qCount = 0; quizPool = [...i18n[lang].quizzes].sort(()=>Math.random()-0.5);
            document.getElementById('game-layer').style.display='flex';
            document.getElementById('result-screen').style.display='none';
            document.getElementById('quiz-screen').style.display='block';
            nextQ();
        }

        function nextQ() {
            if(qCount >= 6) { showRes(); return; }
            qCount++; currentQuiz = quizPool[qCount-1];
            document.getElementById('quiz-progress').innerText = (lang==='zh'?'題目: ':'Q: ') + qCount + " / 6";
            document.getElementById('qIcon').innerText = currentQuiz.i;
            document.getElementById('qText').innerText = currentQuiz.q;
            document.getElementById('feedback').innerText = '';
            const area = document.getElementById('gameArea'); area.innerHTML = '';
            if(currentQuiz.t==='c') {
                area.innerHTML = `<div class="ans-grid">
                    <button class="ans-btn" onclick="check('prism',this)">${i18n[lang].prism}</button>
                    <button class="ans-btn" onclick="check('pyramid',this)">${i18n[lang].pyramid}</button>
                    <button class="ans-btn" onclick="check('sphere',this)">${i18n[lang].sphere}</button>
                </div>`;
            } else {
                area.innerHTML = `<div class="input-area" style="display:flex; gap:10px; margin-top:20px;">
                    <input type="text" id="ansIn" style="flex:1; padding:15px; border-radius:15px; border:2px solid #ddd; font-size:1.2rem; text-align:center;" placeholder="...">
                    <button class="ans-btn" style="background:var(--secondary);color:white; padding:0 25px;" onclick="checkIn()">OK</button></div>`;
            }
        }

        function check(a, btn) {
            const ok = a === currentQuiz.a; if(ok) score+=10;
            btn.style.background = ok ? 'var(--success)' : 'var(--error)';
            btn.style.color = 'white';
            showFb(ok);
        }

        function checkIn() {
            const val = document.getElementById('ansIn').value.trim();
            const ok = currentQuiz.a.includes(val); if(ok) score+=10;
            showFb(ok);
        }

        function showFb(ok) {
            const f = document.getElementById('feedback');
            f.innerText = ok ? i18n[lang].correct : i18n[lang].wrong;
            f.style.color = ok ? 'var(--success)' : 'var(--error)';
            setTimeout(nextQ, 1000);
        }

        function skipQuestion() { nextQ(); }

        function showRes() {
            document.getElementById('quiz-screen').style.display='none';
            document.getElementById('result-screen').style.display='block';
            document.getElementById('resScore').innerText = score + "分";
            document.getElementById('resFeedback').innerText = score >= 40 ? (lang==='zh'?"你表現得太棒了！":"Amazing Job!") : (lang==='zh'?"繼續努力！":"Keep it up!");
        }

        function exitGame() { document.getElementById('game-layer').style.display='none'; }

        function toggleLang() { lang = lang==='zh'?'en':'zh'; updateUI(); }

        function updateUI() {
            document.getElementById('modeText').innerText = lang==='zh'?'挑戰模式':'Challenge';
            const active = document.querySelector('.shape-btn.active');
            if(active) loadShape(active.getAttribute('onclick').match(/'([^']+)'/)[1]);
        }

        init3D();
    </script>
</body>
</html>
