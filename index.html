<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>立體幾何 MASTER 9.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f4f7fb; overflow: hidden; touch-action: none; }
        #canvas-container { 
            width: 100%; height: 480px; 
            background: radial-gradient(circle, #ffffff 0%, #e8ecf3 100%);
            border-radius: 3rem; position: relative; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
        .btn-active { background-color: #4f46e5 !important; color: white !important; transform: scale(1.05); }
        input[type=range] { -webkit-appearance: none; width: 100%; height: 14px; background: #d1d5db; border-radius: 10px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 34px; width: 34px; border-radius: 50%; background: #4f46e5; cursor: pointer; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .quiz-card { cursor: pointer; border: 4px solid #eef2f8; border-radius: 2.5rem; transition: 0.3s; background: white; padding: 25px; text-align: center; }
        .quiz-card:hover { border-color: #4f46e5; transform: translateY(-8px); }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 px-10 h-20 flex justify-between items-center">
        <div class="flex items-center gap-5">
            <div class="h-14 w-44 bg-slate-50 rounded-2xl flex items-center justify-center border-2 border-dashed border-indigo-200 overflow-hidden shadow-inner">
                <img src="logo.png" id="mainLogo" onerror="this.style.display='none'; this.parentNode.innerText='Husky Master'" class="max-h-full">
            </div>
            <h1 class="text-2xl font-black tracking-tighter text-indigo-900">立體幾何 <span class="text-indigo-600">MASTER 9.0</span></h1>
        </div>
        <button onclick="toggleLang()" class="bg-indigo-600 text-white px-6 py-2.5 rounded-full font-bold text-sm shadow-lg shadow-indigo-200 hover:bg-indigo-700">EN / 中文</button>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <div class="flex justify-center mb-10">
            <div class="bg-slate-200 p-1.5 rounded-[2rem] inline-flex shadow-inner">
                <button onclick="switchMode('learn')" id="tab-learn" class="tab-btn btn-active px-14 py-3.5 rounded-[1.5rem] text-sm font-black transition-all">動態學習</button>
                <button onclick="switchMode('quiz')" id="tab-quiz" class="tab-btn px-14 py-3.5 rounded-[1.5rem] text-sm font-black transition-all">挑戰測驗</button>
            </div>
        </div>

        <div id="learn-panel" class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-8">
                <div id="canvas-container">
                    <div class="absolute top-6 left-6 bg-white/90 backdrop-blur px-5 py-2.5 rounded-2xl text-[11px] font-black uppercase text-indigo-600 border border-indigo-100 shadow-sm">
                        High-Precision Net Engine 9.0
                    </div>
                </div>
                
                <div class="mt-8 bg-white p-10 rounded-[3.5rem] shadow-2xl border border-slate-50">
                    <div class="flex justify-between items-center mb-8">
                        <span class="text-sm font-black text-slate-400 uppercase tracking-widest" id="lbl-net">展開圖狀態</span>
                        <span class="text-5xl font-black text-indigo-600" id="percent-display">0%</span>
                        <span class="text-sm font-black text-slate-400 uppercase tracking-widest" id="lbl-solid">立體圖形</span>
                    </div>
                    <input type="range" id="fold-slider" min="0" max="100" value="0">
                </div>
            </div>

            <div class="lg:col-span-4 space-y-4">
                <div class="grid grid-cols-1 gap-4" id="shape-menu"></div>
                <div class="mt-6 p-8 bg-indigo-600 rounded-[3rem] text-white shadow-2xl shadow-indigo-100 relative overflow-hidden">
                    <div class="relative z-10">
                        <div class="flex items-center gap-3 mb-4">
                            <span class="text-3xl">💡</span>
                            <h4 class="font-black text-xl">學習小提示</h4>
                        </div>
                        <p id="learning-tip" class="text-indigo-50 leading-relaxed font-medium text-lg">請選擇圖形開始學習！</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="quiz-panel" class="hidden max-w-6xl mx-auto">
            <div class="text-center mb-12">
                <h2 id="quiz-title" class="text-4xl font-black mb-4 text-slate-900">小小幾何專家挑戰</h2>
                <p id="quiz-desc" class="text-slate-500 text-xl">觀察展開圖的比例與連接處，選出唯一正確的答案。</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="quiz-options"></div>
            <div id="quiz-feedback" class="mt-12 p-10 rounded-[3rem] hidden text-center text-3xl font-black shadow-2xl transition-all"></div>
        </div>
    </main>

    <script>
        let scene, camera, renderer, controls, rootPivot = new THREE.Group();
        let hingeList = []; 
        let currentLang = 'zh';

        const SHAPE_DATA = {
            cube: { zh: "正方體", en: "Cube", tip: "正方體有 6 個相同的面。在展開圖中，中間 4 個面連成線，上下各 1 個，是經典的「1-4-1」結構。" },
            rect: { zh: "長方體", en: "Cuboid", tip: "長方體由 3 對全等的矩形組成。展開圖中，相對的面面積必須相等且不能直接相連。" },
            tri_prism: { zh: "三角柱", en: "Tri-Prism", tip: "三角柱由 2 個三角形底面和 3 個矩形側面組成。側面摺疊的角度是 120 度。" },
            pyramid: { zh: "四角錐", en: "Sq. Pyramid", tip: "四角錐由 1 個正方形和 4 個三角形組成。側面三角形會向上摺起並在頂點匯合。" }
        };

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, container.offsetWidth / container.offsetHeight, 0.1, 1000);
            camera.position.set(10, 10, 12);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.offsetWidth, container.offsetHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // 光影修復：解決黑面問題
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const light1 = new THREE.DirectionalLight(0xffffff, 0.6);
            light1.position.set(5, 10, 7);
            scene.add(light1);
            const light2 = new THREE.PointLight(0xffffff, 0.5);
            light2.position.set(-10, -5, -10);
            scene.add(light2);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            scene.add(rootPivot);

            renderMenu();
            loadShape('cube');
            animate();
        }

        function createPanel(w, h, color, px, py) {
            const group = new THREE.Group();
            const mesh = new THREE.Mesh(
                new THREE.PlaneGeometry(w, h),
                new THREE.MeshStandardMaterial({ 
                    color: color, 
                    side: THREE.DoubleSide, 
                    transparent: true, 
                    opacity: 0.9,
                    roughness: 0.4,
                    metalness: 0.1
                })
            );
            const edges = new THREE.LineSegments(
                new THREE.EdgesGeometry(mesh.geometry),
                new THREE.LineBasicMaterial({ color: 0x2d3748, linewidth: 2 })
            );
            mesh.add(edges);
            mesh.position.set(px, py, 0); 
            group.add(mesh);
            return { group, w, h };
        }

        function loadShape(type) {
            while(rootPivot.children.length > 0) rootPivot.remove(rootPivot.children[0]);
            hingeList = [];
            const cBase = 0x6366f1, cSide = 0x818cf8;

            if(type === 'cube') {
                const S = 2;
                const b = createPanel(S, S, cBase, 0, 0); b.group.rotation.x = -Math.PI/2; rootPivot.add(b.group);
                const add = (p, x, y, ax, ang, mx, my) => {
                    const n = createPanel(S, S, cSide, mx, my); n.group.position.set(x, y, 0);
                    p.add(n.group); hingeList.push({ obj: n.group, axis: ax, angle: ang });
                    return n.group;
                };
                const f = add(b.group, 0, S/2, 'x', -Math.PI/2, 0, S/2);
                add(b.group, 0, -S/2, 'x', Math.PI/2, 0, -S/2);
                add(b.group, -S/2, 0, 'y', -Math.PI/2, -S/2, 0);
                add(b.group, S/2, 0, 'y', Math.PI/2, S/2, 0);
                add(f, 0, S, 'x', -Math.PI/2, 0, S/2);
            }
            else if(type === 'tri_prism') {
                const S = 2.2, L = 3.8;
                const b = createPanel(S, L, cBase, 0, 0); b.group.rotation.x = -Math.PI/2; rootPivot.add(b.group);
                const addS = (x, ang) => {
                    const p = createPanel(S, L, cSide, x, 0); p.group.position.set(x, 0, 0);
                    b.group.add(p.group); hingeList.push({obj: p.group, axis: 'y', angle: ang});
                };
                addS(-S/2, -Math.PI/1.5);
                addS(S/2, Math.PI/1.5);
                const triGeo = new THREE.CircleGeometry(S/Math.sqrt(3), 3);
                const addT = (y, ang, rZ) => {
                    const g = new THREE.Group(); g.position.set(0, y, 0); b.group.add(g);
                    const m = new THREE.Mesh(triGeo, new THREE.MeshStandardMaterial({color:cSide, side:2}));
                    m.rotation.z = rZ; m.position.y = (y>0?1:-1)*(S*Math.sqrt(3)/6);
                    if(y<0) m.scale.y = -1;
                    g.add(m); hingeList.push({obj: g, axis:'x', angle: ang});
                };
                addT(L/2, -Math.PI/2, Math.PI/6);
                addT(-L/2, Math.PI/2, -Math.PI/6);
            }
            else if(type === 'pyramid') {
                const S = 2.8;
                const hT = Math.sqrt(S*S - (S/2)*(S/2));
                const b = createPanel(S, S, cBase, 0, 0); b.group.rotation.x = -Math.PI/2; rootPivot.add(b.group);
                const triGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-S/2,0,0), new THREE.Vector3(S/2,0,0), new THREE.Vector3(0,hT,0)]);
                const addT = (x, y, rZ, ax, ang) => {
                    const g = new THREE.Group(); g.position.set(x, y, 0); g.rotation.z = rZ; b.group.add(g);
                    const m = new THREE.Mesh(triGeo, new THREE.MeshStandardMaterial({color:cSide, side:2}));
                    m.add(new THREE.LineSegments(new THREE.EdgesGeometry(triGeo), new THREE.LineBasicMaterial({color:0x1a202c})));
                    g.add(m); hingeList.push({obj:g, axis:ax, angle:ang});
                };
                const ang = -1.23;
                addT(0, S/2, 0, 'x', ang);
                addT(0, -S/2, Math.PI, 'x', ang);
                addT(-S/2, 0, Math.PI/2, 'y', ang);
                addT(S/2, 0, -Math.PI/2, 'y', -ang);
            }
            else if(type === 'rect') {
                const L=4, W=2.5, H=1.6;
                const b = createPanel(L, W, cBase, 0, 0); b.group.rotation.x = -Math.PI/2; rootPivot.add(b.group);
                const add = (p, w, h, x, y, ax, ang, mx, my, rZ=0) => {
                    const g = createPanel(w, h, cSide, mx, my); g.group.position.set(x, y, 0);
                    if(rZ) g.children[0].rotation.z = rZ;
                    p.add(g.group); hingeList.push({obj: g.group, axis: ax, angle: ang});
                    return g.group;
                };
                const f = add(b.group, L, H, 0, W/2, 'x', -Math.PI/2, 0, H/2);
                add(b.group, L, H, 0, -W/2, 'x', Math.PI/2, 0, -H/2);
                add(b.group, H, W, -L/2, 0, 'y', -Math.PI/2, -H/2, 0, Math.PI/2);
                add(b.group, H, W, L/2, 0, 'y', Math.PI/2, H/2, 0, Math.PI/2);
                add(f, L, W, 0, H, 'x', -Math.PI/2, 0, W/2);
            }

            document.getElementById('fold-slider').value = 0;
            updateFolding(0);
            document.getElementById('learning-tip').innerText = SHAPE_DATA[type][currentLang==='zh'?'tip':'tip'];
        }

        function updateFolding(v) {
            const p = v / 100;
            hingeList.forEach(h => {
                if(h.axis === 'x') h.obj.rotation.x = h.angle * p;
                else h.obj.rotation.y = h.angle * p;
            });
            document.getElementById('percent-display').innerText = v + "%";
        }

        document.getElementById('fold-slider').oninput = (e) => updateFolding(e.target.value);

        // --- 測驗修復：Canvas 繪製 ---
        function drawQuizNet(cvs, type) {
            const ctx = cvs.getContext('2d');
            const S = 35; ctx.clearRect(0,0,300,200);
            ctx.strokeStyle = "#4f46e5"; ctx.lineWidth = 3; ctx.setLineDash([]);
            const cx = 150, cy = 100;
            
            const nets = {
                ok1: [[0,0], [1,0], [-1,0], [-2,0], [0,1], [0,-1]], 
                err1: [[0,0], [1,0], [2,0], [3,0], [0,1], [0,-1]], 
                pyr: [[0,0], [1,0], [-1,0], [0,1], [0,-1]],
                rect: [[0,0], [1.2,0], [-1.2,0], [-2.4,0], [0,0.8], [0,-0.8]]
            };

            const p = nets[type];
            p.forEach(b => {
                if(type === 'pyr' && b !== p[0]) {
                    ctx.beginPath();
                    const x = cx + b[0]*S, y = cy - b[1]*S;
                    if(b[0]!==0) { ctx.moveTo(x+(b[0]>0?-S/2:S/2), y-S/2); ctx.lineTo(x+(b[0]>0?-S/2:S/2), y+S/2); ctx.lineTo(x+(b[0]>0?S/2:-S/2), y); }
                    else { ctx.moveTo(x-S/2, y+(b[1]>0?S/2:-S/2)); ctx.lineTo(x+S/2, y+(b[1]>0?S/2:-S/2)); ctx.lineTo(x, y+(b[1]>0?-S/2:S/2)); }
                    ctx.closePath(); ctx.stroke();
                } else {
                    const w = (type==='rect' && b[1]===0) ? S*1.2 : S;
                    const h = (type==='rect' && Math.abs(b[1])>0) ? S*0.8 : S;
                    ctx.strokeRect(cx+b[0]*S-w/2, cy-b[1]*S-h/2, w, h);
                }
            });
        }

        function startQuiz() {
            const container = document.getElementById('quiz-options');
            container.innerHTML = '';
            document.getElementById('quiz-feedback').classList.add('hidden');
            
            const qSet = [
                { title: "哪個是正確的正方體展開圖？", pool: [{t:'ok1', ok:true}, {t:'err1', ok:false}] },
                { title: "長方體的展開圖中，對面應該？", pool: [{t:'rect', l:'大小相同', ok:true}, {t:'ok1', l:'大小不一', ok:false}] },
                { title: "這個展開圖能摺成什麼立體？", pool: [{t:'pyr', l:'四角錐', ok:true}, {t:'rect', l:'三角柱', ok:false}] }
            ];

            const currentQ = qSet[Math.floor(Math.random() * qSet.length)];
            document.getElementById('quiz-title').innerText = currentQ.title;

            currentQ.pool.sort(() => Math.random() - 0.5).forEach(item => {
                const card = document.createElement('div');
                card.className = "quiz-card";
                const cvs = document.createElement('canvas'); cvs.width=300; cvs.height=180; cvs.className="mx-auto mb-4";
                card.appendChild(cvs);
                if(item.l) { const label = document.createElement('div'); label.innerText = item.l; label.className="font-black text-indigo-600 text-lg"; card.appendChild(label); }
                card.onclick = () => {
                    const fb = document.getElementById('quiz-feedback');
                    fb.classList.remove('hidden', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700');
                    if(item.ok) { fb.innerText = "✅ 答對了！太聰明了！"; fb.classList.add('bg-green-100','text-green-700'); setTimeout(startQuiz, 2500); }
                    else { fb.innerText = "❌ 答錯了，再仔細數數面和邊！"; fb.classList.add('bg-red-100','text-red-700'); }
                };
                container.appendChild(card);
                drawQuizNet(cvs, item.t);
            });
        }

        function switchMode(m) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('btn-active'));
            document.getElementById('tab-'+m).classList.add('btn-active');
            document.getElementById('learn-panel').classList.toggle('hidden', m!=='learn');
            document.getElementById('quiz-panel').classList.toggle('hidden', m!=='quiz');
            if(m==='quiz') startQuiz();
        }

        function toggleLang() { currentLang = (currentLang==='zh')?'en':'zh'; updateUI(); }
        function updateUI() {
            document.getElementById('tab-learn').innerText = currentLang==='zh'?'動態學習':'Learn';
            document.getElementById('tab-quiz').innerText = currentLang==='zh'?'挑戰測驗':'Quiz';
            renderMenu();
        }

        function renderMenu() {
            const m = document.getElementById('shape-menu'); m.innerHTML = '';
            const data = [{id:'cube', i:'🧊'}, {id:'rect', i:'📦'}, {id:'tri_prism', i:'🧀'}, {id:'pyramid', i:'⛺'}];
            data.forEach(d => {
                const b = document.createElement('button');
                b.className = "bg-white hover:bg-indigo-50 p-7 rounded-[2.5rem] border-2 border-slate-100 flex items-center gap-6 transition-all shadow-sm group";
                b.onclick = () => loadShape(d.id);
                b.innerHTML = `<span class="text-4xl group-hover:scale-110 transition-transform">${d.i}</span><span class="font-black text-xl">${SHAPE_DATA[d.id][currentLang]}</span>`;
                m.appendChild(b);
            });
        }

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        window.onload = init;
    </script>
</body>
</html>
