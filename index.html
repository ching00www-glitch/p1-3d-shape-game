<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小五數學：立體圖形大師 8.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f4f8; overflow: hidden; touch-action: none; }
        #canvas-container { 
            width: 100%; height: 450px; 
            background: radial-gradient(circle, #ffffff 0%, #e2e8f0 100%);
            border-radius: 2.5rem; position: relative; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        .btn-active { background-color: #4f46e5 !important; color: white !important; transform: scale(1.05); }
        input[type=range] { -webkit-appearance: none; width: 100%; height: 12px; background: #cbd5e1; border-radius: 10px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 32px; width: 32px; border-radius: 50%; background: #4f46e5; cursor: pointer; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .quiz-card { cursor: pointer; border: 3px solid #e2e8f0; border-radius: 2rem; transition: 0.3s; background: white; padding: 20px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .quiz-card:hover { border-color: #4f46e5; transform: translateY(-5px); }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 px-8 h-20 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="h-14 w-40 bg-slate-100 rounded-xl flex items-center justify-center border-2 border-dashed border-slate-300 overflow-hidden">
                <img src="logo.png" id="mainLogo" onerror="this.style.display='none'; this.parentNode.innerText='LOGO 200x80'" class="max-h-full">
            </div>
            <h1 class="text-2xl font-black text-slate-900 tracking-tight">立體幾何 <span class="text-indigo-600">MASTER 8.0</span></h1>
        </div>
        <button onclick="toggleLang()" class="bg-indigo-50 text-indigo-600 px-6 py-2 rounded-full font-bold text-sm hover:bg-indigo-100 transition-colors">EN / 中文</button>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex justify-center mb-8">
            <div class="bg-slate-200 p-1.5 rounded-3xl inline-flex shadow-inner">
                <button onclick="switchMode('learn')" id="tab-learn" class="tab-btn btn-active px-12 py-3 rounded-2xl text-sm font-black transition-all">動態學習</button>
                <button onclick="switchMode('quiz')" id="tab-quiz" class="tab-btn px-12 py-3 rounded-2xl text-sm font-black transition-all">挑戰測驗</button>
            </div>
        </div>

        <div id="learn-panel" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8">
                <div id="canvas-container">
                    <div class="absolute top-6 left-6 bg-white/80 backdrop-blur px-4 py-2 rounded-xl text-[10px] font-black uppercase text-indigo-600 border border-indigo-100">
                        High-Precision Net Engine
                    </div>
                </div>
                
                <div class="mt-6 bg-white p-8 rounded-[3rem] shadow-xl border border-slate-100">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-sm font-black text-slate-400 uppercase tracking-widest" id="lbl-net">展開圖狀態</span>
                        <span class="text-4xl font-black text-indigo-600" id="percent-display">0%</span>
                        <span class="text-sm font-black text-slate-400 uppercase tracking-widest" id="lbl-solid">立體圖形</span>
                    </div>
                    <input type="range" id="fold-slider" min="0" max="100" value="0">
                </div>
            </div>

            <div class="lg:col-span-4 space-y-4">
                <div class="grid grid-cols-1 gap-3" id="shape-menu"></div>
                
                <div class="mt-4 p-8 bg-indigo-600 rounded-[2.5rem] text-white shadow-2xl shadow-indigo-200">
                    <div class="flex items-center gap-3 mb-3">
                        <span class="text-2xl">💡</span>
                        <h4 class="font-black text-lg">學習小提示</h4>
                    </div>
                    <p id="learning-tip" class="text-indigo-100 leading-relaxed font-medium">請選擇圖形開始學習！</p>
                </div>
            </div>
        </div>

        <div id="quiz-panel" class="hidden max-w-5xl mx-auto">
            <div class="text-center mb-10">
                <h2 id="quiz-title" class="text-3xl font-black mb-3">誰是正確的展開圖？</h2>
                <p id="quiz-desc" class="text-slate-500 text-lg">觀察圖樣的連接方式，選出唯一的正確答案。</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="quiz-options"></div>
            <div id="quiz-feedback" class="mt-10 p-8 rounded-3xl hidden text-center text-2xl font-black shadow-xl"></div>
        </div>
    </main>

    <script>
        let scene, camera, renderer, controls, rootPivot = new THREE.Group();
        let hingeList = []; 
        let currentLang = 'zh';

        const SHAPE_DATA = {
            cube: { zh: "正方體", en: "Cube", tip: "正方體有 6 個相同的正方形面。展開圖中，若一排有 4 個面，上下各連 1 個（1-4-1），是最標準的樣式！" },
            rect: { zh: "長方體", en: "Cuboid", tip: "長方體由 3 對全等的矩形組成。展開圖中，相對的面（如底和頂）大小必須完全相同且不能相連。" },
            tri_prism: { zh: "三角柱", en: "Tri-Prism", tip: "三角柱有 2 個三角形和 3 個長方形。摺起時，側面的長方形會繞著三角形的邊合攏。" },
            pyramid: { zh: "四角錐", en: "Sq. Pyramid", tip: "四角錐有 1 個正方形底面和 4 個三角形側面。所有三角形側面在摺起後會匯聚在一個頂點上。" }
        };

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, container.offsetWidth / container.offsetHeight, 0.1, 1000);
            camera.position.set(8, 8, 10);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.offsetWidth, container.offsetHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 0.5);
            light.position.set(5, 10, 7);
            scene.add(light);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            scene.add(rootPivot);

            renderMenu();
            loadShape('cube');
            animate();
        }

        // --- 核心：精確摺疊組件 ---
        function createPanel(w, h, color, px, py) {
            const group = new THREE.Group();
            const mesh = new THREE.Mesh(
                new THREE.PlaneGeometry(w, h),
                new THREE.MeshPhongMaterial({ color: color, side: THREE.DoubleSide, transparent:true, opacity:0.95 })
            );
            mesh.add(new THREE.LineSegments(
                new THREE.EdgesGeometry(mesh.geometry),
                new THREE.LineBasicMaterial({ color: 0x111111, linewidth: 2 })
            ));
            mesh.position.set(px, py, 0); 
            group.add(mesh);
            return { group, w, h };
        }

        function loadShape(type) {
            while(rootPivot.children.length > 0) rootPivot.remove(rootPivot.children[0]);
            hingeList = [];
            const colB = 0x6366f1, colS = 0x818cf8;

            if(type === 'cube') {
                const S = 2;
                const b = createPanel(S, S, colB, 0, 0); b.group.rotation.x = -Math.PI/2; rootPivot.add(b.group);
                const add = (p, x, y, ax, ang, mx, my) => {
                    const n = createPanel(S, S, colS, mx, my); n.group.position.set(x, y, 0);
                    p.add(n.group); hingeList.push({ obj: n.group, axis: ax, angle: ang });
                    return n.group;
                };
                // 向上摺疊路徑
                const f = add(b.group, 0, S/2, 'x', -Math.PI/2, 0, S/2);
                add(b.group, 0, -S/2, 'x', Math.PI/2, 0, -S/2);
                add(b.group, -S/2, 0, 'y', -Math.PI/2, -S/2, 0);
                add(b.group, S/2, 0, 'y', Math.PI/2, S/2, 0);
                add(f, 0, S, 'x', -Math.PI/2, 0, S/2); // 頂蓋
            }
            else if(type === 'tri_prism') {
                const S = 2, L = 3.5;
                const b = createPanel(S, L, colB, 0, 0); b.group.rotation.x = -Math.PI/2; rootPivot.add(b.group);
                // 兩側長方形
                const addS = (x, ang) => {
                    const p = createPanel(S, L, colS, x, 0); p.group.position.set(x, 0, 0);
                    b.group.add(p.group); hingeList.push({obj: p.group, axis: 'y', angle: ang});
                };
                addS(-S/2, -Math.PI/1.5); // 向上轉 120度
                addS(S/2, Math.PI/1.5);
                // 三角底面 (連在中間長方形)
                const triGeo = new THREE.CircleGeometry(S/Math.sqrt(3), 3);
                const addT = (y, ang, rotZ) => {
                    const g = new THREE.Group(); g.position.set(0, y, 0); b.group.add(g);
                    const m = new THREE.Mesh(triGeo, new THREE.MeshPhongMaterial({color:colS, side:2}));
                    m.rotation.z = rotZ; m.position.y = (y>0?1:-1) * (S*Math.sqrt(3)/6);
                    g.add(m); hingeList.push({obj: g, axis: 'x', angle: ang});
                };
                addT(L/2, -Math.PI/2, Math.PI/6);
                addT(-L/2, Math.PI/2, -Math.PI/6);
            }
            else if(type === 'pyramid') {
                const S = 2.5;
                const b = createPanel(S, S, colB, 0, 0); b.group.rotation.x = -Math.PI/2; rootPivot.add(b.group);
                const hTri = Math.sqrt(S*S - (S/2)*(S/2));
                const triGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-S/2,0,0), new THREE.Vector3(S/2,0,0), new THREE.Vector3(0,hTri,0)]);
                const addT = (x, y, rZ, ax, ang) => {
                    const g = new THREE.Group(); g.position.set(x, y, 0); g.rotation.z = rZ; b.group.add(g);
                    const m = new THREE.Mesh(triGeo, new THREE.MeshPhongMaterial({color:colS, side:2}));
                    m.add(new THREE.LineSegments(new THREE.EdgesGeometry(triGeo), new THREE.LineBasicMaterial({color:0})));
                    g.add(m); hingeList.push({obj: g, axis: ax, angle: ang});
                };
                // 向中心合攏
                const ang = -1.23;
                addT(0, S/2, 0, 'x', ang);
                addT(0, -S/2, Math.PI, 'x', ang);
                addT(-S/2, 0, Math.PI/2, 'y', ang);
                addT(S/2, 0, -Math.PI/2, 'y', -ang);
            }
            else if(type === 'rect') {
                const L=3.5, W=2, H=1.4;
                const b = createPanel(L, W, colB, 0, 0); b.group.rotation.x = -Math.PI/2; rootPivot.add(b.group);
                const addR = (p, w, h, x, y, ax, ang, mx, my, rZ=0) => {
                    const g = createPanel(w, h, colS, mx, my); g.group.position.set(x, y, 0);
                    if(rZ) g.children[0].rotation.z = rZ;
                    p.add(g.group); hingeList.push({obj: g.group, axis: ax, angle: ang});
                    return g.group;
                };
                const f = addR(b.group, L, H, 0, W/2, 'x', -Math.PI/2, 0, H/2);
                addR(b.group, L, H, 0, -W/2, 'x', Math.PI/2, 0, -H/2);
                addR(b.group, H, W, -L/2, 0, 'y', -Math.PI/2, -H/2, 0, Math.PI/2);
                addR(b.group, H, W, L/2, 0, 'y', Math.PI/2, H/2, 0, Math.PI/2);
                addR(f, L, W, 0, H, 'x', -Math.PI/2, 0, W/2); // 頂面
            }

            document.getElementById('fold-slider').value = 0;
            updateFolding(0);
            document.getElementById('learning-tip').innerText = SHAPE_DATA[type].tip;
        }

        function updateFolding(v) {
            const p = v / 100;
            hingeList.forEach(h => {
                if(h.axis === 'x') h.obj.rotation.x = h.angle * p;
                else h.obj.rotation.y = h.angle * p;
            });
            document.getElementById('percent-display').innerText = v + "%";
        }

        document.getElementById('fold-slider').oninput = (e) => updateFolding(e.target.value);

        // --- 測驗系統 ---
        function drawQuizNet(cvs, type) {
            const ctx = cvs.getContext('2d');
            const S = 35; ctx.clearRect(0,0,300,200);
            ctx.strokeStyle = "#4f46e5"; ctx.lineWidth = 3;
            const cx = 150, cy = 100;
            
            const nets = {
                cube_ok: [[0,0], [1,0], [-1,0], [-2,0], [0,1], [0,-1]], // 1-4-1
                cube_err: [[0,0], [1,0], [2,0], [3,0], [0,1], [0,-1]], // 1-5 Overlap
                rect_ok: [[0,0], [1.2,0], [-1.2,0], [-2.4,0], [0,0.8], [0,-0.8]], // Cuboid
                pyr_ok: [[0,0], [1,0], [-1,0], [0,1], [0,-1]], // Pyramid
                tri_ok: [[0,0], [1,0], [-1,0], [0,1.2], [0,-1.2]] // Prism (part)
            };

            const p = nets[type];
            p.forEach(b => {
                if(type === 'pyr_ok' && b !== p[0]) {
                    ctx.beginPath();
                    const x = cx + b[0]*S, y = cy - b[1]*S;
                    if(b[0]!==0) { ctx.moveTo(x+(b[0]>0?-S/2:S/2), y-S/2); ctx.lineTo(x+(b[0]>0?-S/2:S/2), y+S/2); ctx.lineTo(x+(b[0]>0?S/2:-S/2), y); }
                    else { ctx.moveTo(x-S/2, y+(b[1]>0?S/2:-S/2)); ctx.lineTo(x+S/2, y+(b[1]>0?S/2:-S/2)); ctx.lineTo(x, y+(b[1]>0?-S/2:S/2)); }
                    ctx.closePath(); ctx.stroke();
                } else {
                    const w = (type==='rect_ok' && b[1]===0) ? S*1.2 : S;
                    const h = (type==='rect_ok' && Math.abs(b[1])>0) ? S*0.8 : S;
                    ctx.strokeRect(cx + b[0]*S - w/2, cy - b[1]*S - h/2, w, h);
                }
            });
        }

        function startQuiz() {
            const container = document.getElementById('quiz-options');
            container.innerHTML = '';
            document.getElementById('quiz-feedback').classList.add('hidden');
            
            const qSet = [
                { title: "哪個是正確的正方體展開圖？", pool: [{t:'cube_ok', ok:true}, {t:'cube_err', ok:false}] },
                { title: "這個展開圖能摺成什麼？", pool: [{t:'pyr_ok', l:'四角錐', ok:true}, {t:'rect_ok', l:'長方體', ok:false}] },
                { title: "長方體的展開圖中，對面應該？", pool: [{t:'rect_ok', l:'大小相同', ok:true}, {t:'cube_ok', l:'隨機大小', ok:false}] }
            ];

            const currentQ = qSet[Math.floor(Math.random() * qSet.length)];
            document.getElementById('quiz-title').innerText = currentQ.title;

            currentQ.pool.sort(() => Math.random() - 0.5).forEach(item => {
                const card = document.createElement('div');
                card.className = "quiz-card";
                const cvs = document.createElement('canvas'); cvs.width=300; cvs.height=200; cvs.className="w-full";
                card.appendChild(cvs);
                if(item.l) { const label = document.createElement('div'); label.innerText = item.l; label.className="font-bold mt-4 text-indigo-600"; card.appendChild(label); }
                card.onclick = () => {
                    const fb = document.getElementById('quiz-feedback');
                    fb.classList.remove('hidden', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700');
                    if(item.ok) { fb.innerText = "✅ 答對了！太聰明了！"; fb.classList.add('bg-green-100','text-green-700'); setTimeout(startQuiz, 2000); }
                    else { fb.innerText = "❌ 答錯了，再觀察看看。"; fb.classList.add('bg-red-100','text-red-700'); }
                };
                container.appendChild(card);
                drawNet(cvs, item.t);
            });
        }

        function switchMode(m) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('btn-active'));
            document.getElementById('tab-'+m).classList.add('btn-active');
            document.getElementById('learn-panel').classList.toggle('hidden', m!=='learn');
            document.getElementById('quiz-panel').classList.toggle('hidden', m!=='quiz');
            if(m==='quiz') startQuiz();
        }

        function toggleLang() { currentLang = (currentLang==='zh')?'en':'zh'; updateUI(); if(document.getElementById('quiz-panel').style.display !== 'none') startQuiz(); }

        function updateUI() {
            document.getElementById('tab-learn').innerText = currentLang==='zh'?'動態學習':'Learn';
            document.getElementById('tab-quiz').innerText = currentLang==='zh'?'挑戰測驗':'Quiz';
            document.getElementById('lbl-net').innerText = currentLang==='zh'?'展開圖狀態':'Net Status';
            document.getElementById('lbl-solid').innerText = currentLang==='zh'?'立體圖形':'3D Solid';
            renderMenu();
        }

        function renderMenu() {
            const m = document.getElementById('shape-menu'); m.innerHTML = '';
            const data = [{id:'cube', i:'🧊'}, {id:'rect', i:'📦'}, {id:'tri_prism', i:'🧀'}, {id:'pyramid', i:'⛺'}];
            data.forEach(d => {
                const b = document.createElement('button');
                b.className = "bg-white hover:bg-indigo-50 p-6 rounded-[2rem] border-2 border-slate-100 flex items-center gap-5 transition-all shadow-sm group";
                b.onclick = () => loadShape(d.id);
                b.innerHTML = `<span class="text-4xl group-hover:scale-110 transition-transform">${d.i}</span><span class="font-black text-lg">${SHAPE_DATA[d.id][currentLang]}</span>`;
                m.appendChild(b);
            });
        }

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        window.onload = init;
    </script>
</body>
</html>
