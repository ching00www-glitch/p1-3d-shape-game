<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五年級：摺紙圖樣動態模擬器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        #canvas-container { 
            width: 100%; height: 500px; 
            background: radial-gradient(circle, #ffffff 0%, #e2e8f0 100%);
            border-radius: 1.5rem; position: relative; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .tab-btn.active { background-color: #4f46e5; color: white; }
        input[type=range] { -webkit-appearance: none; width: 100%; height: 12px; background: #ddd; border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 26px; width: 26px; border-radius: 50%; background: #4f46e5; cursor: pointer; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="h-10 w-20 bg-indigo-600 rounded flex items-center justify-center text-white font-bold">LOGO</div>
                <h1 class="text-lg font-bold">立體圖樣展開實驗室 <span class="text-indigo-600">Net Simulator</span></h1>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-center mb-6">
            <div class="bg-slate-200 p-1 rounded-2xl inline-flex">
                <button onclick="switchMode('learn')" id="tab-learn" class="tab-btn active px-10 py-3 rounded-xl text-sm font-bold transition-all">觀察與摺疊</button>
                <button onclick="switchMode('quiz')" id="tab-quiz" class="tab-btn px-10 py-3 rounded-xl text-sm font-bold transition-all">挑戰測驗</button>
            </div>
        </div>

        <div id="learn-panel" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8">
                <div id="canvas-container">
                    <div class="absolute top-4 left-4 bg-white/90 px-4 py-2 rounded-lg shadow text-xs font-bold text-slate-500 z-10">
                        可用手指或滑鼠旋轉形狀
                    </div>
                </div>
                
                <div class="mt-6 bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                    <div class="flex justify-between font-bold mb-4">
                        <span class="text-indigo-600">平面圖樣 (Net)</span>
                        <span class="text-indigo-600">完成摺疊 (Solid)</span>
                    </div>
                    <input type="range" id="fold-slider" min="0" max="100" value="0">
                    <p class="text-center text-slate-400 mt-4">移動滑桿看著紙張如何變成盒子！</p>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h2 id="shape-title" class="text-2xl font-bold text-indigo-600 mb-2">正方體展開圖</h2>
                    <p id="shape-desc" class="text-slate-500 text-sm mb-6">五年級重點：正方體有 11 種不同的展開圖樣。每個面在摺疊時會旋轉 90 度。</p>
                    
                    <div class="space-y-3">
                        <button onclick="changeShape('cube')" class="w-full bg-slate-50 hover:bg-indigo-50 p-4 rounded-2xl border-2 border-transparent hover:border-indigo-200 text-left transition flex items-center gap-4">
                            <span class="text-2xl">🧊</span>
                            <span class="font-bold">正方體 (1-4-1 樣式)</span>
                        </button>
                        <button onclick="changeShape('tri_prism')" class="w-full bg-slate-50 hover:bg-indigo-50 p-4 rounded-2xl border-2 border-transparent hover:border-indigo-200 text-left transition flex items-center gap-4">
                            <span class="text-2xl">🧀</span>
                            <span class="font-bold">三角柱展開圖</span>
                        </button>
                    </div>
                </div>

                <div class="bg-indigo-900 rounded-3xl p-6 text-white shadow-xl">
                    <h3 class="font-bold mb-3 flex items-center gap-2">
                        <svg class="w-5 h-5 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"></path></svg>
                        學習小撇步
                    </h3>
                    <ul class="text-sm space-y-2 text-indigo-100">
                        <li>• 正方體有 6 個相等的正方形面。</li>
                        <li>• 摺疊時，相鄰的邊會合在一起。</li>
                        <li>• 注意展開圖中「對面」的位置。</li>
                    </ul>
                </div>
            </div>
        </div>

        <div id="quiz-panel" class="hidden max-w-2xl mx-auto bg-white p-8 rounded-3xl shadow-xl border border-slate-200 text-center">
            <h2 class="text-2xl font-bold mb-4">挑戰測驗：這是哪種圖形的展開圖？</h2>
            <div id="quiz-visual-placeholder" class="h-64 bg-slate-100 rounded-2xl mb-8 flex items-center justify-center"></div>
            <div id="quiz-options" class="grid grid-cols-2 gap-4"></div>
            <div id="quiz-feedback" class="mt-4 p-4 rounded-xl hidden font-bold"></div>
        </div>
    </main>

    <script>
        let scene, camera, renderer, controls;
        let facesGroup = new THREE.Group();
        let panels = []; // 儲存每個面的物件與其樞紐

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.offsetWidth / container.offsetHeight, 0.1, 1000);
            camera.position.set(5, 5, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.offsetWidth, container.offsetHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 0.5);
            light.position.set(10, 10, 10);
            scene.add(light);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(facesGroup);
            createCubeNet(); // 預設生成正方體展開圖
            animate();
        }

        // 核心功能：建立可旋轉的正方體展開圖 (1-4-1 結構)
        function createCubeNet() {
            while(facesGroup.children.length > 0) facesGroup.remove(facesGroup.children[0]);
            panels = [];

            const size = 1.5;
            const material = new THREE.MeshPhongMaterial({ color: 0x6366f1, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
            const edgeMaterial = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });

            function createPanel(id) {
                const geo = new THREE.PlaneGeometry(size, size);
                const mesh = new THREE.Mesh(geo, material);
                
                // 加上稜線
                const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geo), edgeMaterial);
                mesh.add(edges);
                
                const pivot = new THREE.Group();
                pivot.add(mesh);
                return { pivot, mesh };
            }

            // 1-4-1 佈局
            // 面1 (中心/底)
            const f1 = createPanel('bottom');
            facesGroup.add(f1.pivot);

            // 面2 (左) - 相對於面1
            const f2 = createPanel('left');
            f2.mesh.position.x = -size/2;
            f2.pivot.position.x = -size/2;
            f1.pivot.add(f2.pivot);

            // 面3 (右) - 相對於面1
            const f3 = createPanel('right');
            f3.mesh.position.x = size/2;
            f3.pivot.position.x = size/2;
            f1.pivot.add(f3.pivot);

            // 面4 (上) - 相對於面1
            const f4 = createPanel('front');
            f4.mesh.position.y = size/2;
            f4.pivot.position.y = size/2;
            f1.pivot.add(f4.pivot);

            // 面5 (下) - 相對於面1
            const f5 = createPanel('back');
            f5.mesh.position.y = -size/2;
            f5.pivot.position.y = -size/2;
            f1.pivot.add(f5.pivot);

            // 面6 (最末端) - 相對於面5
            const f6 = createPanel('top');
            f6.mesh.position.y = -size/2;
            f6.pivot.position.y = -size/2;
            f5.pivot.add(f6.pivot);

            panels = [
                { p: f2.pivot, axis: 'y', angle: Math.PI/2 },  // 左面往上摺
                { p: f3.pivot, axis: 'y', angle: -Math.PI/2 }, // 右面往上摺
                { p: f4.pivot, axis: 'x', angle: -Math.PI/2 }, // 前面往上摺
                { p: f5.pivot, axis: 'x', angle: Math.PI/2 },  // 後面往上摺
                { p: f6.pivot, axis: 'x', angle: Math.PI/2 }   // 頂面再摺一次
            ];

            // 初始修正，讓面平躺在 XZ 平面上
            f1.pivot.rotation.x = -Math.PI/2;
        }

        // 建立三角柱展開圖
        function createTriPrismNet() {
            while(facesGroup.children.length > 0) facesGroup.remove(facesGroup.children[0]);
            panels = [];

            const w = 1.5, h = 2.5;
            const material = new THREE.MeshPhongMaterial({ color: 0x10b981, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
            
            function createRect() {
                const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), material);
                mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry), new THREE.LineBasicMaterial({color:0})));
                const pivot = new THREE.Group(); pivot.add(mesh);
                return { pivot, mesh };
            }

            function createTri() {
                const shape = new THREE.Shape();
                shape.moveTo(0, 0); shape.lineTo(w, 0); shape.lineTo(w/2, (Math.sqrt(3)/2)*w); shape.closePath();
                const mesh = new THREE.Mesh(new THREE.ShapeGeometry(shape), material);
                mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry), new THREE.LineBasicMaterial({color:0})));
                mesh.position.set(-w/2, 0, 0);
                const pivot = new THREE.Group(); pivot.add(mesh);
                return { pivot, mesh };
            }

            const r1 = createRect(); facesGroup.add(r1.pivot);
            const r2 = createRect(); r2.mesh.position.x = -w/2; r2.pivot.position.x = -w/2; r1.pivot.add(r2.pivot);
            const r3 = createRect(); r3.mesh.position.x = w/2; r3.pivot.position.x = w/2; r1.pivot.add(r3.pivot);
            
            const t1 = createTri(); t1.mesh.position.y = h/2; t1.pivot.position.y = h/2; r1.pivot.add(t1.pivot);
            const t2 = createTri(); t2.mesh.scale.y = -1; t2.mesh.position.y = -h/2; t2.pivot.position.y = -h/2; r1.pivot.add(t2.pivot);

            panels = [
                { p: r2.pivot, axis: 'y', angle: Math.PI/1.5 },
                { p: r3.pivot, axis: 'y', angle: -Math.PI/1.5 },
                { p: t1.pivot, axis: 'x', angle: -Math.PI/2 },
                { p: t2.pivot, axis: 'x', angle: Math.PI/2 }
            ];
            r1.pivot.rotation.x = -Math.PI/2;
        }

        function updateFolding(val) {
            const percent = val / 100;
            panels.forEach(item => {
                if(item.axis === 'x') item.p.rotation.x = item.angle * percent;
                if(item.axis === 'y') item.p.rotation.y = item.angle * percent;
            });
        }

        document.getElementById('fold-slider').oninput = (e) => {
            updateFolding(e.target.value);
        };

        function changeShape(type) {
            if(type === 'cube') {
                createCubeNet();
                document.getElementById('shape-title').innerText = "正方體展開圖";
                document.getElementById('shape-desc').innerText = "這是一個經典的 1-4-1 型展開圖，可以摺成完整的小盒子。";
            } else {
                createTriPrismNet();
                document.getElementById('shape-title').innerText = "三角柱展開圖";
                document.getElementById('shape-desc').innerText = "由三個矩形側面和兩個三角形底面組成。";
            }
            document.getElementById('fold-slider').value = 0;
        }

        function switchMode(mode) {
            const learn = document.getElementById('learn-panel');
            const quiz = document.getElementById('quiz-panel');
            const canvas = renderer.domElement;

            document.getElementById('tab-learn').classList.toggle('active', mode === 'learn');
            document.getElementById('tab-quiz').classList.toggle('active', mode === 'quiz');

            if(mode === 'quiz') {
                learn.classList.add('hidden');
                quiz.classList.remove('hidden');
                document.getElementById('quiz-visual-placeholder').appendChild(canvas);
                renderer.setSize(quiz.offsetWidth - 60, 250);
                startQuiz();
            } else {
                learn.classList.remove('hidden');
                quiz.classList.add('hidden');
                document.getElementById('canvas-container').appendChild(canvas);
                renderer.setSize(document.getElementById('canvas-container').offsetWidth, 500);
            }
        }

        function startQuiz() {
            const isCube = Math.random() > 0.5;
            changeShape(isCube ? 'cube' : 'tri_prism');
            updateFolding(0); // 測驗時顯示展開狀態
            
            const opts = document.getElementById('quiz-options');
            opts.innerHTML = `
                <button onclick="checkAns(true, ${isCube})" class="p-6 bg-slate-100 rounded-2xl font-bold hover:bg-indigo-500 hover:text-white transition">正方體</button>
                <button onclick="checkAns(false, ${isCube})" class="p-6 bg-slate-100 rounded-2xl font-bold hover:bg-indigo-500 hover:text-white transition">三角柱</button>
            `;
            document.getElementById('quiz-feedback').classList.add('hidden');
        }

        function checkAns(choiceIsCube, actualIsCube) {
            const win = choiceIsCube === actualIsCube;
            const fb = document.getElementById('quiz-feedback');
            fb.classList.remove('hidden', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700');
            fb.classList.add(win ? 'bg-green-100' : 'bg-red-100');
            fb.classList.add(win ? 'text-green-700' : 'text-red-700');
            fb.innerText = win ? "✅ 太棒了！觀察得很正確！" : "❌ 不太對喔，再看看展開圖的面。";
            
            if(win) {
                // 答對後自動播放摺疊動畫
                let v = 0;
                const timer = setInterval(() => {
                    v += 2; updateFolding(v);
                    if(v >= 100) { clearInterval(timer); setTimeout(startQuiz, 2000); }
                }, 20);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
