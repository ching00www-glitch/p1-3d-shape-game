<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>立體幾何 MASTER 11.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f7ff; overflow: hidden; touch-action: none; }
        #canvas-container { 
            width: 100%; height: 460px; 
            background: radial-gradient(circle, #ffffff 0%, #dbeafe 100%);
            border-radius: 2.5rem; position: relative; overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        .btn-active { background-color: #4f46e5 !important; color: white !important; transform: scale(1.05); }
        input[type=range] { -webkit-appearance: none; width: 100%; height: 14px; background: #cbd5e1; border-radius: 10px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 36px; width: 36px; border-radius: 50%; background: #4f46e5; cursor: pointer; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .quiz-card { cursor: pointer; border: 4px solid #fff; border-radius: 2.5rem; transition: 0.3s; background: white; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .quiz-card:hover { border-color: #4f46e5; transform: translateY(-5px); }
        #cursor-tooltip { position: fixed; background: white; border: 3px solid #4f46e5; padding: 6px 15px; border-radius: 15px; font-weight: bold; z-index: 1000; pointer-events: none; display: none; }
    </style>
</head>
<body>

    <div id="cursor-tooltip"></div>

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 px-8 h-20 flex justify-between items-center">
        <div class="flex items-center gap-6">
            <div class="h-16 w-48 bg-transparent flex items-center justify-center overflow-hidden">
                <img src="logo.png" id="mainLogo" onerror="this.style.display='none'; this.parentNode.innerText='Husky Logo';" class="max-h-full">
            </div>
            <h1 class="text-2xl font-black text-indigo-900 tracking-tighter">立體幾何 MASTER 11.0</h1>
        </div>
        <button onclick="toggleLang()" class="bg-indigo-600 text-white px-6 py-2 rounded-full font-black text-sm shadow-md hover:bg-indigo-700">EN / 中文</button>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-6">
        <div class="flex justify-center mb-6">
            <div class="bg-slate-200 p-1.5 rounded-[2.5rem] inline-flex shadow-inner">
                <button onclick="switchMode('learn')" id="tab-learn" class="tab-btn btn-active px-14 py-3 rounded-[2rem] text-sm font-black transition-all">動態學習模式</button>
                <button onclick="switchMode('quiz')" id="tab-quiz" class="tab-btn px-14 py-3 rounded-[2rem] text-sm font-black transition-all">挑戰測驗</button>
            </div>
        </div>

        <div id="learn-panel" class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-8">
                <div id="canvas-container">
                    <div class="absolute top-6 left-6 bg-white/90 px-4 py-2 rounded-xl text-[10px] font-black uppercase text-indigo-600 border border-indigo-50">
                        High-Stability 3D Engine
                    </div>
                </div>
                
                <div class="mt-6 bg-white p-10 rounded-[3.5rem] shadow-xl border border-slate-50 text-center">
                    <div class="flex justify-between items-center mb-6">
                        <span class="font-black text-slate-400 uppercase tracking-widest" id="lbl-net">展開圖</span>
                        <span class="text-5xl font-black text-indigo-600" id="percent-display">0%</span>
                        <span class="font-black text-slate-400 uppercase tracking-widest" id="lbl-solid">立體圖形</span>
                    </div>
                    <input type="range" id="fold-slider" min="0" max="100" value="0">
                </div>
            </div>

            <div class="lg:col-span-4 space-y-4">
                <div class="grid grid-cols-1 gap-3" id="shape-menu"></div>
                <div class="mt-4 p-8 bg-indigo-600 rounded-[3rem] text-white shadow-2xl">
                    <div class="flex items-center gap-3 mb-2">
                        <span class="text-2xl">💡</span>
                        <h4 class="font-black text-xl">學習小提示</h4>
                    </div>
                    <p id="learning-tip" class="text-indigo-50 leading-relaxed font-medium text-lg">選擇一個圖形來觀察它的摺疊過程！</p>
                </div>
            </div>
        </div>

        <div id="quiz-panel" class="hidden max-w-6xl mx-auto">
            <div class="text-center mb-10">
                <div id="quiz-progress" class="inline-block px-4 py-1 bg-indigo-100 text-indigo-600 rounded-full font-bold mb-4">題目: 1 / 6</div>
                <h2 id="quiz-title" class="text-4xl font-black mb-2 text-slate-900">小小幾何專家挑戰</h2>
                <p id="quiz-desc" class="text-slate-500 text-xl font-medium">觀察圖形，選出唯一正確的答案。</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="quiz-options"></div>
            <div id="quiz-feedback" class="mt-12 p-10 rounded-[3rem] hidden text-center text-3xl font-black shadow-2xl transition-all"></div>
        </div>
    </main>

    <script>
        let scene, camera, renderer, controls, rootPivot = new THREE.Group();
        let hingeList = []; let currentLang = 'zh'; let score = 0; let qCount = 0;

        const SHAPE_DATA = {
            cube: { zh: "正方體", en: "Cube", tip: "正方體有 6 個相同的面。摺疊時，每一邊都會轉動 90 度。" },
            rect: { zh: "長方體", en: "Cuboid", tip: "長方體由不同尺寸的矩形組成，相對的面必須完全一樣。" },
            tri_prism: { zh: "三角柱", en: "Tri-Prism", tip: "三角柱有 2 個三角形底面和 3 個側面。側面圍繞底面摺疊。" },
            pyramid: { zh: "四角錐", en: "Sq. Pyramid", tip: "四角錐的 4 個三角形側面會向上合攏並在最高點碰頭。" }
        };

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, container.offsetWidth / container.offsetHeight, 0.1, 1000);
            camera.position.set(12, 12, 15);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.offsetWidth, container.offsetHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 光影：確保全方位明亮
            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const sun = new THREE.DirectionalLight(0xffffff, 0.6);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            scene.add(rootPivot);

            window.addEventListener('pointermove', onPointerMove);
            renderMenu();
            loadShape('cube');
            animate();
        }

        function createFace(w, h, color, px, py) {
            const group = new THREE.Group();
            const mesh = new THREE.Mesh(
                new THREE.PlaneGeometry(w, h),
                new THREE.MeshStandardMaterial({ color: color, side: THREE.DoubleSide, transparent:true, opacity:0.95 })
            );
            mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry), new THREE.LineBasicMaterial({color:0x000, linewidth:2})));
            mesh.position.set(px, py, 0); 
            group.add(mesh);
            return group;
        }

        function loadShape(type) {
            while(rootPivot.children.length > 0) rootPivot.remove(rootPivot.children[0]);
            hingeList = [];
            const col = 0x6366f1;

            if(type === 'cube') {
                const S = 2.5;
                const b = createFace(S, S, col, 0, 0); b.rotation.x = -Math.PI/2; rootPivot.add(b);
                const add = (p, x, y, ax, ang, mx, my) => {
                    const g = createFace(S, S, col, mx, my); g.position.set(x, y, 0);
                    p.add(g); hingeList.push({obj: g, ax: ax, ang: ang}); return g;
                };
                const f = add(b, 0, S/2, 'x', -Math.PI/2, 0, S/2);
                add(b, 0, -S/2, 'x', Math.PI/2, 0, -S/2);
                add(b, -S/2, 0, 'y', -Math.PI/2, -S/2, 0);
                add(b, S/2, 0, 'y', Math.PI/2, S/2, 0);
                add(f, 0, S, 'x', -Math.PI/2, 0, S/2);
            }
            else if(type === 'tri_prism') {
                const S = 2.5, L = 4.5;
                const b = createFace(S, L, col, 0, 0); b.rotation.x = -Math.PI/2; rootPivot.add(b);
                const add = (p, x, y, ax, ang, mx, my) => {
                    const g = createFace(S, L, col, mx, my); g.position.set(x, y, 0);
                    p.add(g); hingeList.push({obj: g, ax: ax, ang: ang}); return g;
                };
                add(b, -S, 0, 'y', -Math.PI/1.5, -S/2, 0);
                add(b, S, 0, 'y', Math.PI/1.5, S/2, 0);
                
                const tri = (y, ang) => {
                    const g = new THREE.Group(); g.position.set(0, y, 0); b.add(g);
                    const m = new THREE.Mesh(new THREE.CircleGeometry(S/Math.sqrt(3), 3), new THREE.MeshStandardMaterial({color:col, side:2}));
                    m.rotation.z = Math.PI/6; m.position.y = (y>0?1:-1)*(S*Math.sqrt(3)/6);
                    if(y<0) m.scale.y = -1;
                    g.add(m); hingeList.push({obj:g, ax:'x', ang:ang});
                };
                tri(L/2, -Math.PI/2); tri(-L/2, Math.PI/2);
            }
            else if(type === 'pyramid') {
                const S = 3.5;
                const b = createFace(S, S, col, 0, 0); b.rotation.x = -Math.PI/2; rootPivot.add(b);
                const hT = Math.sqrt(S*S - (S/2)*(S/2));
                const triGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-S/2,0,0), new THREE.Vector3(S/2,0,0), new THREE.Vector3(0,hT,0)]);
                const tri = (x, y, rz, ax, ang) => {
                    const g = new THREE.Group(); g.position.set(x, y, 0); g.rotation.z = rz; b.add(g);
                    const m = new THREE.Mesh(triGeo, new THREE.MeshStandardMaterial({color:col, side:2}));
                    m.add(new THREE.LineSegments(new THREE.EdgesGeometry(triGeo), new THREE.LineBasicMaterial({color:0})));
                    g.add(m); hingeList.push({obj:g, ax:ax, ang:ang});
                };
                const ang = -1.23;
                tri(0, S/2, 0, 'x', ang); tri(0, -S/2, Math.PI, 'x', ang);
                tri(-S/2, 0, Math.PI/2, 'y', ang); tri(S/2, 0, -Math.PI/2, 'y', -ang);
            }
            else if(type === 'rect') {
                const L=4, W=2.5, H=1.6;
                const b = createFace(L, W, col, 0, 0); b.rotation.x = -Math.PI/2; rootPivot.add(b);
                const addR = (p, w, h, x, y, ax, ang, mx, my) => {
                    const g = createFace(w, h, col, mx, my); g.position.set(x, y, 0);
                    p.add(g); hingeList.push({obj: g, ax: ax, ang: ang}); return g;
                };
                const f = addR(b, L, H, 0, W/2, 'x', -Math.PI/2, 0, H/2);
                addR(b, L, H, 0, -W/2, 'x', Math.PI/2, 0, -H/2);
                addR(b, H, W, -L/2, 0, 'y', -Math.PI/2, -H/2, 0);
                addR(b, H, W, L/2, 0, 'y', Math.PI/2, H/2, 0);
                addR(f, L, W, 0, H, 'x', -Math.PI/2, 0, W/2);
            }

            document.getElementById('fold-slider').value = 0;
            updateFolding(0);
            document.getElementById('learning-tip').innerText = SHAPE_DATA[type][currentLang==='zh'?'tip':'tip'];
        }

        function updateFolding(v) {
            const p = v / 100;
            hingeList.forEach(h => {
                if(h.ax === 'x') h.obj.rotation.x = h.ang * p;
                else h.obj.rotation.y = h.ang * p;
            });
            document.getElementById('percent-display').innerText = v + "%";
        }

        document.getElementById('fold-slider').oninput = (e) => updateFolding(e.target.value);

        function onPointerMove(e) {
            const tip = document.getElementById('cursor-tooltip');
            const ray = new THREE.Raycaster();
            const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
            ray.setFromCamera(mouse, camera);
            const hits = ray.intersectObjects(scene.children, true);
            if(hits.length > 0) {
                tip.style.display = 'block'; tip.style.left = e.clientX+15+'px'; tip.style.top = e.clientY+15+'px';
                tip.innerText = currentLang==='zh'?'摺紙面':'Panel';
            } else tip.style.display = 'none';
        }

        function startQuiz() {
            const container = document.getElementById('quiz-options'); container.innerHTML = '';
            document.getElementById('quiz-feedback').classList.add('hidden');
            const qSet = [
                { title: "哪個是正確的正方體展開圖？", pool: [{t:'ok', ok:true}, {t:'err', ok:false}] },
                { title: "長方體的對面大小應該？", pool: [{t:'r_ok', l:'完全相同', ok:true}, {t:'ok', l:'大小不一', ok:false}] }
            ];
            qCount++; if(qCount>6){ showRes(); return; }
            document.getElementById('quiz-progress').innerText = "題目: " + qCount + " / 6";
            const q = qSet[Math.floor(Math.random()*qSet.length)];
            document.getElementById('quiz-title').innerText = q.title;
            q.pool.forEach(item => {
                const card = document.createElement('div'); card.className = "quiz-card";
                const cvs = document.createElement('canvas'); cvs.width=300; cvs.height=150; cvs.className="mx-auto";
                card.appendChild(cvs);
                if(item.l){ const lbl=document.createElement('div'); lbl.innerText=item.l; lbl.className="font-black mt-4"; card.appendChild(lbl); }
                card.onclick = () => {
                    const fb = document.getElementById('quiz-feedback'); fb.classList.remove('hidden');
                    if(item.ok) { score+=10; fb.innerText="✅ 答對了！"; fb.className="mt-12 p-8 bg-green-100 text-green-700 rounded-3xl"; setTimeout(startQuiz, 1500); }
                    else { fb.innerText="❌ 不對喔！"; fb.className="mt-12 p-8 bg-red-100 text-red-700 rounded-3xl"; }
                };
                container.appendChild(card);
                drawNet(cvs, item.t);
            });
        }

        function drawNet(cvs, t) {
            const ctx = cvs.getContext('2d'); const S=30; ctx.clearRect(0,0,300,150); ctx.strokeStyle="#4f46e5"; ctx.lineWidth=3;
            const cx=150, cy=75;
            const p = (t==='ok') ? [[0,0],[1,0],[-1,0],[-2,0],[0,1],[0,-1]] : [[0,0],[1,0],[2,0],[3,0],[0,1],[0,-1]];
            p.forEach(b => ctx.strokeRect(cx+b[0]*S-S/2, cy-b[1]*S-S/2, S, S));
        }

        function showRes() {
            document.getElementById('quiz-panel').innerHTML = `<div class="text-center p-20 bg-white rounded-[3rem] shadow-2xl">
                <h2 class="text-5xl font-black mb-8">挑戰結束！</h2>
                <div class="text-7xl font-black text-indigo-600 mb-8">${score}分</div>
                <button onclick="location.reload()" class="bg-indigo-600 text-white px-10 py-4 rounded-full font-black">重新開始</button>
            </div>`;
        }

        function switchMode(m) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('btn-active'));
            document.getElementById('tab-'+m).classList.add('btn-active');
            document.getElementById('learn-panel').classList.toggle('hidden', m!=='learn');
            document.getElementById('quiz-panel').classList.toggle('hidden', m!=='quiz');
            if(m==='quiz') { qCount=0; score=0; startQuiz(); }
        }

        function toggleLang() { currentLang = (currentLang==='zh'?'en':'zh'); updateUI(); }
        function updateUI() {
            document.getElementById('lbl-net').innerText = currentLang==='zh'?'展開圖':'NET';
            document.getElementById('lbl-solid').innerText = currentLang==='zh'?'立體圖形':'3D SOLID';
            renderMenu();
        }

        function renderMenu() {
            const m = document.getElementById('shape-menu'); m.innerHTML = '';
            ['cube','rect','tri_prism','pyramid'].forEach(id => {
                const b = document.createElement('button');
                b.className = "bg-white hover:bg-indigo-50 p-6 rounded-[2rem] border-2 border-slate-100 flex items-center gap-6 transition-all group shadow-sm";
                b.onclick = () => loadShape(id);
                b.innerHTML = `<span class="text-3xl">${id==='cube'?'🧊':id==='rect'?'📦':id==='tri_prism'?'🧀':'⛺'}</span><span class="font-black text-xl">${SHAPE_DATA[id][currentLang]}</span>`;
                m.appendChild(b);
            });
        }

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        window.onload = init;
    </script>
</body>
</html>
